# Generated by deploykit — safe to edit and commit.
# CI overrides the app name per environment via `flyctl deploy --app <name>`.
app = "web"
primary_region = "iad"

# Build context is the repo root; CI passes --dockerfile apps/web/Dockerfile.

# Database migrations: [deploy].release_command runs once per release,
# before new machines take traffic — the idiomatic place for migrations.
# deploykit generated this COMMENTED OUT and never runs it. Uncomment only
# against a database you own, and confirm the Prisma CLI + schema are present in
# the runtime image. A destructive migration here can cause irreversible data
# loss, and it is not undone by `deploykit rollback` (which reverts the image
# only). See the Database migrations section of the README.
# [deploy]
#   release_command = "(cd packages/database && npx prisma migrate deploy --schema ./prisma/schema.prisma)"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  # Health check: Fly waits for this to pass before shifting traffic to a new
  # release, and keeps the old machines running if it fails — auto-rollback on a
  # bad deploy. If "/" 404s (e.g. an API with no root route), point
  # it at a lightweight endpoint via `healthCheckPath` in deploykit.config.ts.
  # grace_period is deliberately generous: a slow SSR cold-start on shared-cpu
  # shouldn't be mistaken for a bad release and block the deploy.
  [[http_service.checks]]
    method = "GET"
    path = "/"
    interval = "15s"
    timeout = "5s"
    grace_period = "30s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
