# Generated by deploykit — safe to edit and commit.
# CI overrides the app name per environment via `flyctl deploy --app <name>`.
app = "marketing"
primary_region = "iad"

# Build context is the repo root; CI passes --dockerfile apps/marketing/Dockerfile.

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  # Health check: Fly waits for this to pass before shifting traffic to a new
  # release, and keeps the old machines running if it fails — auto-rollback on a
  # bad deploy. If "/" 404s (e.g. an API with no root route), point
  # it at a lightweight endpoint via `healthCheckPath` in deploykit.config.ts.
  [[http_service.checks]]
    method = "GET"
    path = "/"
    interval = "15s"
    timeout = "5s"
    grace_period = "10s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
